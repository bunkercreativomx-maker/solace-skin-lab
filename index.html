  {id:2,title:"Botox Results",hook:"Subtle. Natural. Stunning.",copy:"See real before & after results from our Botox treatments. Natural-looking outcomes that let your true beauty shine. Starting at $399.99.",cta:"SCHEDULE CONSULTATION",price:"$399+",img:"ad_botox_results.jpg",tag:"RESULTS",adSet:1},
  {id:3,title:"Neurotoxin Menu",hook:"Your Custom Neurotoxin Plan Starts at $99",copy:"Botox, Dysport, Xeomin — three options, one goal: your best skin. Our experts help you pick the right one.",cta:"EXPLORE OPTIONS",price:"$99+",img:"ad_neurotoxin_menu.jpg",tag:"$99+",adSet:2},
  {id:4,title:"Microneedling 3 Tiers",hook:"Collagen Boost Without Downtime",copy:"Express, Advanced, or Premium — three tiers of microneedling tailored to your skin goals and budget.",cta:"BOOK YOUR SESSION",price:"$250+",img:"ad_microneedling_tiers.jpg",tag:"3 TIERS",adSet:2},
  {id:5,title:"Dermaplaning + Facial",hook:"Glow Deeper This Week ✨",copy:"Remove dead skin + peach fuzz + deep cleanse + hydrate. All in one session. Your skin's secret layer is waiting to shine.",cta:"$149.99 — BOOK NOW",price:"$149.99",img:"ad_dermaplaning_facial.jpg",tag:"GLOW",adSet:3},
  {id:6,title:"Botox Party Weekend 🎉",hook:"Botox Party Weekend!",copy:"Bring your crew, get treated together. Group discounts available this weekend only. Champagne included!",cta:"INVITE YOUR CREW",price:"GROUP DISCOUNT",img:"ad_botox_party_weekend.jpg",tag:"GROUP",adSet:3}
];

// Build 30-day calendar
const allDays = [];
let clientIdx = 0;
for (let d = 1; d <= 30; d++) {
  const dt = new Date(START_DATE);
  dt.setDate(dt.getDate() + d - 1);
  const dayName = DAYS_ES[dt.getDay()];
  const dateStr = dayName + ' ' + dt.getDate() + ' ' + MONTHS_ES[dt.getMonth()];
  if (APPROVED_DAYS.includes(d)) {
    const post = approvedPosts.find(p => p.day === d);
    if (post) allDays.push(Object.assign({}, post, {day:d, dateStr, scheduledTime:"09:00"}));
  } else {
    if (clientIdx < clientPosts.length) {
      const cp = clientPosts[clientIdx++];
      allDays.push(Object.assign({}, cp, {day:d, dateStr, scheduledTime:"09:00"}));
    }
  }
}

// State
const state = {approved:{}, skipped:{}, notes:{}, filter:'all'};
APPROVED_DAYS.forEach(d => state.approved[d] = true);
// Pre-loaded notes from client export
state.notes[2] = "El precio es $149.99";
state.notes[6] = "Solo es Botox cosmetics";
state.notes[11] = "Cambiar foto por la real que te voy a dar";

function save(){
  try{localStorage.setItem('ssl_state',JSON.stringify({approved:state.approved,skipped:state.skipped,notes:state.notes}))}catch(e){}
}
function load(){
  try{
    const s=JSON.parse(localStorage.getItem('ssl_state'));
    if(s){Object.assign(state.approved,s.approved||{});Object.assign(state.skipped,s.skipped||{});Object.assign(state.notes,s.notes||{})}
  }catch(e){}
}
function countByStatus(){
  let a=0,sk=0,pe=0;
  allDays.forEach(p=>{if(state.approved[p.day])a++;else if(state.skipped[p.day])sk++;else pe++});
  return{approved:a,skipped:sk,pending:pe,total:allDays.length};
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){
  const c=countByStatus();
  const pct=Math.round((c.approved/c.total)*100);
  const app=document.getElementById('app');

  let cards='';
  allDays.filter(p=>{
    if(state.filter==='approved')return state.approved[p.day];
    if(state.filter==='skipped')return state.skipped[p.day];
    if(state.filter==='pending')return!state.approved[p.day]&&!state.skipped[p.day];
    if(state.filter==='client')return p.isClient;
    return true;
  }).forEach((p,i)=>{
    const isApp=state.approved[p.day];
    const isSkip=state.skipped[p.day];
    const sc=isApp?'approved':isSkip?'skipped':'';
    const bt=p.type==='Promo'?'badge-promo':p.type==='Educativo'?'badge-edu':(p.type==='Social'||p.type==='BTS'||p.type==='Engagement')?'badge-social':'badge-type';
    const nv=state.notes[p.day]||'';
    cards+=`
    <div class="post-card ${sc}" id="card-${p.day}" style="animation-delay:${i*0.04}s">
      <div class="card-header">
        <div><div class="card-day">DIA ${p.day}</div><div class="card-date">${p.dateStr}</div></div>
        <div class="card-badges">
          <span class="badge ${bt}">${p.type}</span>
          <span class="badge badge-time">🕐 ${p.scheduledTime}</span>
          ${p.isClient?'<span class="badge badge-client">👤 CLIENTE</span>':''}
          ${isApp?'<span class="badge badge-approved">✅</span>':''}
          ${isSkip?'<span class="badge badge-skipped">⏭️</span>':''}
        </div>
      </div>
      <div class="card-image-wrap">
        <img class="card-image" src="images/${p.img}" alt="${esc(p.title)}" loading="lazy" onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<div class=\\'image-placeholder\\'>🖼️ Loading...</div>')">
        ${isApp?'<div class="status-indicator status-approved">✓</div>':''}
        ${isSkip?'<div class="status-indicator status-skipped">⏭</div>':''}
      </div>
      <div class="card-body">
        ${p.price?'<div class="price-tag">'+esc(p.price)+'</div>':''}
        <div class="card-hook">${esc(p.hook)}</div>
        <div class="card-copy">${esc(p.copy)}</div>
        <div class="card-cta">${esc(p.cta)}</div>
      </div>
      <div class="card-notes">
        <textarea class="notes-field" placeholder="Add notes..." onchange="addNote(${p.day},this.value)" onblur="addNote(${p.day},this.value)">${esc(nv)}</textarea>
      </div>
      <div class="card-actions">
        <button class="btn btn-approve" onclick="approveDay(${p.day})">✓ Approve</button>
        <button class="btn btn-skip" onclick="skipDay(${p.day})">⏭ Skip</button>
        <button class="btn btn-edit" onclick="editDay(${p.day})">✎ Edit</button>
      </div>
    </div>`;
  });

  let adCards='';
  FB_ADS.forEach((ad,i)=>{
    adCards+=`
    <div class="ad-card" style="animation-delay:${i*0.08}s">
      <img class="ad-image" src="images/${ad.img}" alt="${esc(ad.title)}" loading="lazy" onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<div style=\\'width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:var\(--dark\);color:var\(--text-muted\);font-size:13px\\'>📷 Image not available</div>')">
      <div class="ad-body">
        <div class="ad-headline">Ad ${ad.id} — ${esc(ad.title)}</div>
        ${ad.price?'<div class="price-tag">'+esc(ad.price)+'</div>':''}
        <div class="ad-hook">${esc(ad.hook)}</div>
        <div class="ad-copy">${esc(ad.copy)}</div>
        <div class="ad-cta-tag">📞 ${esc(ad.cta)}</div>
        <div class="ad-tags">
          <span class="badge badge-promo">${ad.tag}</span>
          <span class="badge badge-type">Ad Set ${ad.adSet}</span>
        </div>
      </div>
    </div>`;
  });

  app.innerHTML=`
  <div class="loader" id="loader"><div class="loader-ring"></div><div class="loader-text">SOLACE SKIN LAB</div></div>
  <header class="header"><div class="header-inner">
    <div class="brand"><div class="brand-logo">S</div><div><h1>Solace Skin Lab Med Spa</h1><span>Content Review Portal</span></div></div>
    <span style="font-size:12px;color:var(--text-dim)">23 Jun — 22 Jul 2026</span>
  </div></header>
  <div class="progress-wrap"><div class="progress-header"><span class="progress-label">Approval Progress</span><span class="progress-count">${c.approved}/${c.total} Approved (${pct}%)</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>
  <div class="stats-bar">
    <div class="stat-chip"><div class="stat-dot" style="background:var(--green)"></div> Approved: ${c.approved}</div>
    <div class="stat-chip"><div class="stat-dot" style="background:var(--orange)"></div> Skipped: ${c.skipped}</div>
    <div class="stat-chip"><div class="stat-dot" style="background:var(--text-dim)"></div> Pending: ${c.pending}</div>
    <div class="stat-chip"><div class="stat-dot" style="background:var(--gold)"></div> Client: 15</div>
    <div class="stat-chip"><div class="stat-dot" style="background:var(--blue)"></div> Ads: 6</div>
  </div>
  <div class="filter-bar">
    <button class="filter-btn ${state.filter==='all'?'active':''}" onclick="setFilter('all')">All (${c.total})</button>
    <button class="filter-btn ${state.filter==='approved'?'active':''}" onclick="setFilter('approved')">✅ Approved (${c.approved})</button>
    <button class="filter-btn ${state.filter==='pending'?'active':''}" onclick="setFilter('pending')">⏳ Pending (${c.pending})</button>
    <button class="filter-btn ${state.filter==='skipped'?'active':''}" onclick="setFilter('skipped')">⏭️ Skipped (${c.skipped})</button>
    <button class="filter-btn ${state.filter==='client'?'active':''}" onclick="setFilter('client')">👤 Client Posts</button>
  </div>
  <div class="main">
    <div class="section-title">📅 Content Calendar — 30 Days</div>
    <div class="post-grid">${cards}</div>
    <div class="section-title">📱 Facebook Ads Campaign — 6 Ads</div>
    <div class="ads-section">
      <p style="color:var(--text-dim);margin-bottom:4px">Campaign: Engagement & Page Growth | Budget: $100/day | CTR: 2.25%</p>
      <p style="color:var(--text-dim);font-size:12px">Target: Women 25-55, El Paso TX (10-25mi radius)</p>
      <div class="ads-grid">${adCards}</div>
    </div>
    <div class="export-section">
      <h3 style="font-family:'Playfair Display',serif;color:var(--gold);font-size:20px;margin-bottom:4px">Export & Share</h3>
      <p style="color:var(--text-dim);font-size:13px">Download approvals or share with the client via WhatsApp</p>
      <div class="export-btns">
        <button class="btn-export btn-json" onclick="exportJSON()">📥 Export JSON</button>
        <button class="btn-export btn-whatsapp" onclick="shareWhatsApp()">💬 WhatsApp</button>
        <button class="btn-export btn-clear" onclick="clearAll()">🗑️ Clear All</button>
      </div>
    </div>
    <div class="feedback-section">
      <h3 style="font-family:'Playfair Display',serif;color:var(--gold);font-size:20px;margin-bottom:16px">💬 Feedback del Cliente — Jeny & Rick</h3>
      <div class="feedback-item"><span class="feedback-icon">🚨</span><span class="feedback-text"><strong>Lip Filler service missing</strong> — Need JUVÉDERM Lip Filler added to the calendar</span></div>
      <div class="feedback-item"><span class="feedback-icon">🚨</span><span class="feedback-text"><strong>$64.99 promo missing</strong> — Daily promo: Facial + Consultation for $64.99</span></div>
      <div class="feedback-item"><span class="feedback-icon">💡</span><span class="feedback-text"><strong>Replace omitted posts</strong> — Fill gaps with service promo posts</span></div>
      <div class="feedback-item"><span class="feedback-icon">💡</span><span class="feedback-text"><strong>More promos & services</strong> — Rick wants 80% of content to be promos/services</span></div>
      <div class="feedback-item"><span class="feedback-icon">📝</span><span class="feedback-text"><strong>Day 4 note:</strong> "Post from Saturday 20th preferably before Tuesday 🙏"</span></div>
      <div class="feedback-item"><span class="feedback-icon">⚠️</span><span class="feedback-text"><strong>Real photos needed</strong> — Need real client before/after photos, especially Microneedling</span></div>
    </div>
  </div>
  <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0})">↑</button>`;

  setTimeout(()=>{const l=document.getElementById('loader');if(l)l.classList.add('hidden')},600);
  window.onscroll=()=>{const b=document.getElementById('scrollTop');if(b)b.classList.toggle('visible',window.scrollY>400)};
}

function setFilter(f){state.filter=f;render()}
function approveDay(d){state.approved[d]=true;delete state.skipped[d];save();render()}
function skipDay(d){state.skipped[d]=true;delete state.approved[d];save();render()}
function addNote(d,v){state.notes[d]=v;save()}
function editDay(d){
  const card=document.getElementById('card-'+d);if(!card)return;
  const hook=card.querySelector('.card-hook');
  const copy=card.querySelector('.card-copy');
  if(hook.contentEditable==='true'){
    hook.contentEditable='false';copy.contentEditable='false';
    hook.style.border='none';copy.style.border='none';
    const post=allDays.find(p=>p.day===d);
    if(post){post.hook=hook.textContent;post.copy=copy.textContent}
  }else{
    hook.contentEditable='true';copy.contentEditable='true';
    hook.style.border='1px dashed var(--gold)';copy.style.border='1px dashed var(--gold)';
    hook.focus();
  }
}
function exportJSON(){
  // First, collect all notes from DOM
  document.querySelectorAll('.notes-field').forEach(function(el){
    var dayNum = parseInt(el.closest('.post-card').id.replace('card-',''));
    if(dayNum) state.notes[dayNum] = el.value;
  });
  save();
  // Also export hook/copy edits
  document.querySelectorAll('.card-hook[contenteditable],.card-copy[contenteditable]').forEach(function(el){
    el.contentEditable='false';el.style.border='none';
  });
  const data=allDays.map(p=>({day:p.day,title:p.title,hook:p.hook,copy:p.copy,cta:p.cta,image:p.img,date:p.dateStr,price:p.price||'',status:state.approved[p.day]?'approved':state.skipped[p.day]?'skipped':'pending',notes:state.notes[p.day]||'',isClient:p.isClient||false}));
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='solace_approved_2026_06.json';a.click();URL.revokeObjectURL(url);
}
function shareWhatsApp(){
  // Collect notes from DOM first
  document.querySelectorAll('.notes-field').forEach(function(el){
    var dayNum = parseInt(el.closest('.post-card').id.replace('card-',''));
    if(dayNum) state.notes[dayNum] = el.value;
  });
  save();
  const c=countByStatus();
  // Build detailed message
  var msg = '*✨ Solace Skin Lab — Content Review*\n📅 23 Jun - 22 Jul\n✅ Approved: ' + c.approved + '/' + c.total + '\n⏭️ Skipped: ' + c.skipped + '\n⏳ Pending: ' + c.pending;
  // Add notes for approved + skipped
  allDays.forEach(function(p){
    if(state.approved[p.day]||state.skipped[p.day]){
      var note = state.notes[p.day];
      if(note) msg += '\n📝 D' + p.day + ': ' + note;
    }
  });
  msg += '\n\n🔗 ' + 'https://bunkercreativomx-maker.github.io/solace-skin-lab/';
  window.open('https://wa.me/526564535107?text=' + encodeURIComponent(msg), '_blank');
}
function clearAll(){
  if(confirm('Clear all approvals and notes?')){
    state.approved={};state.skipped={};state.notes={};
    localStorage.removeItem('ssl_state');
    APPROVED_DAYS.forEach(d=>state.approved[d]=true);
    render();
  }
}

load();render();

</script>
</body>
</html>
