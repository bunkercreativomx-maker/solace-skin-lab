<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solace Skin Lab — Facebook Ads Creatives</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#f0f0f0;font-family:'Inter',sans-serif;padding:40px;max-width:1000px;margin:0 auto}
h1{font-size:28px;color:#C9A84C;margin-bottom:4px}
.sub{color:#888;font-size:14px;margin-bottom:40px}
.ad-card{background:#111;border:1px solid #222;border-radius:12px;margin-bottom:30px;overflow:hidden}
.ad-card-header{background:#1a1a1a;padding:12px 16px;border-bottom:1px solid #222;font-weight:700;font-size:15px;color:#C9A84C}
.ad-content{display:flex;gap:20px;padding:16px}
.ad-image{width:200px;height:200px;object-fit:cover;border-radius:8px;flex-shrink:0;background:#1a1a1a}
.ad-details{flex:1;min-width:0}
.field{background:#0a0a0a;border:1px solid #222;border-radius:8px;padding:12px;margin-bottom:10px}
.field-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#666;margin-bottom:4px}
.field-value{font-size:13px;line-height:1.5;color:#f0f0f0;word-break:break-word}
.copy-btn{background:linear-gradient(135deg,#C9A84C,#D4B96A);color:#0a0a0a;border:none;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;margin-top:6px;transition:opacity .2s}
.copy-btn:hover{opacity:.8}
.copy-btn.copied{background:#22c55e}
.tag{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.tag-target{background:rgba(59,130,246,.15);color:#3b82f6;margin-right:6px}
.tag-budget{background:rgba(201,168,76,.15);color:#C9A84C}
@media(max-width:768px){.ad-content{flex-direction:column}.ad-image{width:100%;height:auto;aspect-ratio:1/1}}
</style>
</head>
<body>

<h1>📱 Solace Skin Lab — Facebook Ads</h1>
<p class="sub">6 creatividades con hooks mejorados para Meta Ads Manager. Haz clic en "Copiar" para cada campo.</p>

<div id="ads-container"></div>

<script>
const ADS = [
  {id:1,title:"2x1 Tuesday 🥂",image:"ad_2x1_tuesday.jpg",hook:"Why glow alone when your bestie needs a reset too? 👯‍♀️",body:"This Tuesday only: book any service with a friend and BOTH receive a complimentary facial plus a glass of wine on us. Double the glow, double the fun.",cta:"BOOK NOW",headline:"2x1 Tuesday — Book With a Friend",tag:"VALUE",target:"Women 25-55, El Paso TX",budget:"$100/day"},
  {id:2,title:"Botox Results",image:"ad_botox_results.jpg",hook:"Still scared of the 'frozen face' look? 🙅‍♀️",body:"Real BOTOX® Cosmetic results, zero frozen-face. See why El Paso keeps coming back for outcomes so natural, your friends will just think you slept well.",cta:"SCHEDULE CONSULTATION",headline:"BOTOX® Cosmetic — Natural Results",tag:"BOTOX®",target:"Women 25-55, El Paso TX",budget:"$100/day"},
  {id:3,title:"BOTOX Cosmetic Menu",image:"ad_neurotoxin_menu.jpg",hook:"Forehead lines? Crow's feet? Neck bands? 🤔",body:"There's a BOTOX® Cosmetic plan for each one. Choose your treatment area and let our experts build the right plan for your face.",cta:"EXPLORE OPTIONS",headline:"BOTOX® Cosmetic — Starting at $99",tag:"$99+",target:"Women 25-55, El Paso TX",budget:"$100/day"},
  {id:4,title:"Microneedling 3 Tiers",image:"ad_microneedling_tiers.jpg",hook:"Your skin doesn't need surgery. It needs this. 💉",body:"Express, Advanced, or Premium — three tiers of microneedling that boost collagen with zero downtime. Pick the level that matches your goals and budget.",cta:"BOOK YOUR SESSION",headline:"Microneedling — 3 Tiers From $250",tag:"3 TIERS",target:"Women 25-55, El Paso TX",budget:"$100/day"},
  {id:5,title:"Dermaplaning + Facial",image:"ad_dermaplaning_facial.jpg",hook:"That dull layer on your face? Gone in one session. ✨",body:"Dead skin + peach fuzz + deep cleanse + hydrate — all in 60 minutes. Your skin's secret glow is closer than you think.",cta:"$149.99 — BOOK NOW",headline:"Dermaplaning + Complete Facial $149.99",tag:"GLOW",target:"Women 25-55, El Paso TX",budget:"$100/day"},
  {id:6,title:"Botox Party Weekend 🎉",image:"ad_botox_party_weekend.jpg",hook:"Who said anti-aging can't be a party? 🍾",body:"Bring your crew, get treated together. Group discounts available this weekend only. Champagne included!",cta:"INVITE YOUR CREW",headline:"Botox Party — Group Discounts",tag:"GROUP",target:"Women 25-55, El Paso TX",budget:"$100/day"}
];

async function copyText(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = '✅ Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copiar'; btn.classList.remove('copied'); }, 2000);
  } catch(e) {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✅ Copiado!';
    setTimeout(() => { btn.textContent = '📋 Copiar'; }, 2000);
  }
}

const container = document.getElementById('ads-container');
ADS.forEach(ad => {
  const imgUrl = 'https://bunkercreativomx-maker.github.io/solace-skin-lab/images/' + ad.image;
  const card = document.createElement('div');
  card.className = 'ad-card';
  card.innerHTML = `
    <div class="ad-card-header">
      Ad ${ad.id} — ${ad.title}
      <span style="float:right;font-size:11px;color:#666;font-weight:400">
        <span class="tag tag-target">${ad.target}</span>
        <span class="tag tag-budget">${ad.budget}</span>
      </span>
    </div>
    <div class="ad-content">
      <img class="ad-image" src="${imgUrl}" alt="${ad.title}" onerror="this.alt='Image not available'">
      <div class="ad-details">
        <div class="field">
          <div class="field-label">📢 HOOK + BODY (Primary Text)</div>
          <div class="field-value">${ad.hook}<br><br>${ad.body}<br><br>📍 Cielo Vista Mall, El Paso TX | 📞 (915) 209-2060</div>
          <button class="copy-btn" onclick="copyText('${ad.hook.replace(/'/g, "\\'")}\\n\\n${ad.body.replace(/'/g, "\\'")}\\n\\n📍 Cielo Vista Mall, El Paso TX | 📞 (915) 209-2060', this)">📋 Copiar</button>
        </div>
        <div class="field">
          <div class="field-label">🔗 HEADLINE</div>
          <div class="field-value">${ad.headline}</div>
          <button class="copy-btn" onclick="copyText('${ad.headline.replace(/'/g, "\\'")}', this)">📋 Copiar</button>
        </div>
        <div class="field">
          <div class="field-label">🖱️ CALL TO ACTION</div>
          <div class="field-value" style="font-weight:700;color:#C9A84C">${ad.cta}</div>
        </div>
        <div class="field" style="background:rgba(201,168,76,.05);border-color:rgba(201,168,76,.2)">
          <div class="field-label">📸 IMAGE URL</div>
          <div class="field-value" style="font-size:11px;color:#888;word-break:break-all">${imgUrl}</div>
          <button class="copy-btn" onclick="copyText('${imgUrl}', this)">📋 Copiar URL</button>
        </div>
      </div>
    </div>`;
  container.appendChild(card);
});
</script>
</body>
</html>
