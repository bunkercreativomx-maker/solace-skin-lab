<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solace Skin Lab — Facebook Ads Creatives</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#f0f0f0;font-family:'Inter',sans-serif;padding:40px;max-width:1000px;margin:0 auto}
h1{font-size:28px;color:#C9A84C;margin-bottom:4px}
.sub{color:#888;font-size:14px;margin-bottom:40px}
.ad-card{background:#111;border:1px solid #222;border-radius:12px;margin-bottom:30px;overflow:hidden}
.ad-card-header{background:#1a1a1a;padding:12px 16px;border-bottom:1px solid #222;font-weight:700;font-size:15px;color:#C9A84C}
.ad-content{display:flex;gap:20px;padding:16px}
.ad-image{width:200px;height:200px;object-fit:cover;border-radius:8px;flex-shrink:0;background:#1a1a1a}
.ad-details{flex:1;min-width:0}
.field{background:#0a0a0a;border:1px solid #222;border-radius:8px;padding:12px;margin-bottom:10px}
.field-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#666;margin-bottom:4px}
.field-value{font-size:13px;line-height:1.5;color:#f0f0f0;word-break:break-word}
.copy-btn{background:linear-gradient(135deg,#C9A84C,#D4B96A);color:#0a0a0a;border:none;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;margin-top:6px;transition:opacity .2s}
.copy-btn:hover{opacity:.8}
.copy-btn.copied{background:#22c55e}
.tag{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.tag-target{background:rgba(59,130,246,.15);color:#3b82f6;margin-right:6px}
.tag-budget{background:rgba(201,168,76,.15);color:#C9A84C}
@media(max-width:768px){.ad-content{flex-direction:column}.ad-image{width:100%;height:auto;aspect-ratio:1/1}}
</style>
</head>
<body>

<h1>📱 Solace Skin Lab — Facebook Ads</h1>
<p class="sub">6 creatividades listas para Meta Ads Manager. Haz clic en "Copiar" para cada campo.</p>

<div id="ads-container"></div>

<script>
const ADS = [
  {id:1,title:"2x1 Tuesday 🥂",image:"ad_2x1_tuesday.jpg",hook:"Bring a Friend, Get TWO Free Facials! 🥂",body:"This Tuesday only: book any service with a friend and BOTH receive a complimentary facial plus a glass of wine on us. Double the glow, double the fun.",cta:"BOOK NOW",headline:"2x1 Tuesday — Book With a Friend",tag:"VALUE",target:"Women 25-55, El Paso TX",budget:"$100/day"},
  {id:2,title:"Botox Results",image:"ad_botox_results.jpg",hook:"Natural. Refreshed. Confident.",body:"BOTOX\u00ae Cosmetic helps soften the appearance of fine lines and wrinkles. Starting at $99 for glabellar lines. Natural-looking results. Customized treatment plans.",cta:"SCHEDULE CONSULTATION",headline:"BOTOX\u00ae Cosmetic — Natural Results",tag:"BOTOX\u00ae",target:"Women 25-55, El Paso TX",budget:"$100/day"},
  {id:3,title:"BOTOX Cosmetic Menu",image:"ad_neurotoxin_menu.jpg",hook:"Your Custom BOTOX Plan Starts at $99",body:"BOTOX\u00ae Cosmetic \u2014 glabellar lines $99, forehead $99, crow's feet $120, neck bands $179. Choose your treatment area. Our experts help you build the right plan.",cta:"EXPLORE OPTIONS",headline:"BOTOX\u00ae Cosmetic \u2014 Starting at $99",tag:"$99+",target:"Women 25-55, El Paso TX",budget:"$100/day"},
  {id:4,title:"Microneedling 3 Tiers",image:"ad_microneedling_tiers.jpg",hook:"Collagen Boost Without Downtime",body:"Express, Advanced, or Premium \u2014 three tiers of microneedling tailored to your skin goals and budget.",cta:"BOOK YOUR SESSION",headline:"Microneedling \u2014 3 Tiers From $250",tag:"3 TIERS",target:"Women 25-55, El Paso TX",budget:"$100/day"},
  {id:5,title:"Dermaplaning + Facial",image:"ad_dermaplaning_facial.jpg",hook:"Glow Deeper This Week \u2728",body:"Remove dead skin + peach fuzz + deep cleanse + hydrate. All in one session. Your skin's secret layer is waiting to shine.",cta:"$149.99 \u2014 BOOK NOW",headline:"Dermaplaning + Complete Facial $149.99",tag:"GLOW",target:"Women 25-55, El Paso TX",budget:"$100/day"},
  {id:6,title:"Botox Party Weekend 🎉",image:"ad_botox_party_weekend.jpg",hook:"Botox Party Weekend!",body:"Bring your crew, get treated together. Group discounts available this weekend only. Champagne included!",cta:"INVITE YOUR CREW",headline:"Botox Party \u2014 Group Discounts",tag:"GROUP",target:"Women 25-55, El Paso TX",budget:"$100/day"}
];

async function copyText(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = '\u2705 Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '\U0001f4cb Copiar'; btn.classList.remove('copied'); }, 2000);
  } catch(e) {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '\u2705 Copiado!';
    setTimeout(() => { btn.textContent = '\U0001f4cb Copiar'; }, 2000);
  }
}

const container = document.getElementById('ads-container');
ADS.forEach(ad => {
  const imgUrl = 'https://bunkercreativomx-maker.github.io/solace-skin-lab/images/' + ad.image;
  const card = document.createElement('div');
  card.className = 'ad-card';
  card.innerHTML = `
    <div class="ad-card-header">
      Ad ${ad.id} \u2014 ${ad.title}
      <span style="float:right;font-size:11px;color:#666;font-weight:400">
        <span class="tag tag-target">${ad.target}</span>
        <span class="tag tag-budget">${ad.budget}</span>
      </span>
    </div>
    <div class="ad-content">
      <img class="ad-image" src="${imgUrl}" alt="${ad.title}" onerror="this.alt='Image not available'">
      <div class="ad-details">
        <div class="field">
          <div class="field-label">\U0001f4e2 HOOK (Primary Text)</div>
          <div class="field-value">${ad.hook}\n\n${ad.body}</div>
          <button class="copy-btn" onclick="copyText('${ad.hook}\\n\\n${ad.body.replace(/\n/g,"\\n")}', this)">\U0001f4cb Copiar</button>
        </div>
        <div class="field">
          <div class="field-label">\U0001f517 HEADLINE</div>
          <div class="field-value">${ad.headline}</div>
          <button class="copy-btn" onclick="copyText('${ad.headline}', this)">\U0001f4cb Copiar</button>
        </div>
        <div class="field">
          <div class="field-label">\U0001f5b1\ufe0f CALL TO ACTION</div>
          <div class="field-value" style="font-weight:700;color:#C9A84C">${ad.cta}</div>
          <button class="copy-btn" onclick="copyText('${ad.cta}', this)">\U0001f4cb Copiar</button>
        </div>
        <div class="field" style="background:rgba(201,168,76,.05);border-color:rgba(201,168,76,.2)">
          <div class="field-label">\U0001f4f8 IMAGE URL</div>
          <div class="field-value" style="font-size:11px;color:#888;word-break:break-all">${imgUrl}</div>
          <button class="copy-btn" onclick="copyText('${imgUrl}', this)">\U0001f4cb Copiar URL</button>
        </div>
      </div>
    </div>`;
  container.appendChild(card);
});
</script>
</body>
</html>
